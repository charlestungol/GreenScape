name: Build and deploy Python app to Azure Web App - greenscape-employee-client-portal

on:
  push:
    branches:
      - cj-branch
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ✅ Install from backend folder
      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ✅ Package ONLY backend (CRITICAL FIX)
      - name: Prepare deployment package
        run: |
          mkdir release
          cp -r backend/* release/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: release

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: python-app
          path: .

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_2D1E0E2B5D5C49719A3733CFADA53BE4 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_AF9E921055A84547BF86607D4D168D35 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_F9736B0A2480466A91F8CBC62BDAC633 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: greenscape-employee-client-portal
          package: .
